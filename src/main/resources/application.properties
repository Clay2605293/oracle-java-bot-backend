spring.application.name=oracle-java-bot-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:false}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.name=${TELEGRAM_BOT_NAME:oracle-java-bot}
telegram.bot.default-priority-id=${TELEGRAM_BOT_DEFAULT_PRIORITY_ID:2}
telegram.bot.default-status-id=${TELEGRAM_BOT_DEFAULT_STATUS_ID:1}
telegram.bot.default-due-days=${TELEGRAM_BOT_DEFAULT_DUE_DAYS:7}