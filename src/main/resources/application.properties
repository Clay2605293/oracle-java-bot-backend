# =============================
# DATABASE - Oracle ADB
# =============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:oracle.jdbc.OracleDriver}

# =============================
# HIKARI - Oracle ADB friendly
# =============================
spring.datasource.hikari.initialization-fail-timeout=${DB_HIKARI_INITIALIZATION_FAIL_TIMEOUT:-1}
spring.datasource.hikari.connection-timeout=${DB_HIKARI_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.validation-timeout=${DB_HIKARI_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.idle-timeout=${DB_HIKARI_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${DB_HIKARI_MAX_LIFETIME:120000}
spring.datasource.hikari.keepalive-time=${DB_HIKARI_KEEPALIVE_TIME:60000}
spring.datasource.hikari.minimum-idle=${DB_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${DB_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.connection-test-query=${DB_HIKARI_CONNECTION_TEST_QUERY:SELECT 1 FROM DUAL}

# =============================
# JPA / Hibernate
# =============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.OracleDialect}

# =============================
# CORS
# =============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# =============================
# TELEGRAM
# =============================
telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:false}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.name=${TELEGRAM_BOT_NAME:}
telegram.bot.default-priority-id=${TELEGRAM_BOT_DEFAULT_PRIORITY_ID:2}
telegram.bot.default-status-id=${TELEGRAM_BOT_DEFAULT_STATUS_ID:1}
telegram.bot.default-due-days=${TELEGRAM_BOT_DEFAULT_DUE_DAYS:7}

# Importante si usas starter/auto-config de telegrambots
telegrambots.enabled=${TELEGRAM_BOTS_ENABLED:false}

# =============================
# KAFKA
# =============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:oracle-java-bot-group}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}

spring.kafka.consumer.key-deserializer=${KAFKA_KEY_DESERIALIZER:org.apache.kafka.common.serialization.StringDeserializer}
spring.kafka.consumer.value-deserializer=${KAFKA_VALUE_DESERIALIZER:org.springframework.kafka.support.serializer.JsonDeserializer}

spring.kafka.producer.key-serializer=${KAFKA_PRODUCER_KEY_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}
spring.kafka.producer.value-serializer=${KAFKA_PRODUCER_VALUE_SERIALIZER:org.springframework.kafka.support.serializer.JsonSerializer}

spring.kafka.consumer.properties.spring.json.trusted.packages=${KAFKA_TRUSTED_PACKAGES:*}

# Para apagar listeners Kafka en standby/candidate si lo necesitas
spring.kafka.listener.auto-startup=${KAFKA_LISTENER_AUTO_STARTUP:true}

# =============================
# SUPABASE STORAGE - S3
# =============================
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT}
supabase.s3.region=${SUPABASE_S3_REGION}
supabase.s3.access-key=${SUPABASE_S3_ACCESS_KEY}
supabase.s3.secret-key=${SUPABASE_S3_SECRET_KEY}
supabase.storage.bucket=${SUPABASE_BUCKET}
supabase.storage.public-url-base=${SUPABASE_PUBLIC_URL_BASE}