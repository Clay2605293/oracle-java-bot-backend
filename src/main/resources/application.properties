spring.application.name=oracle-java-bot-backend

server.port=${SERVER_PORT:8080}

# =============================
# DATABASE
# =============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# =============================
# HIKARI
# Fail-fast para evitar que el backend arranque "medio vivo"
# cuando Oracle rechaza credenciales o la cuenta está bloqueada.
# =============================
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# Opcional para detectar conexiones retenidas demasiado tiempo.
# Útil en pruebas; si mete mucho ruido en logs, lo puedes quitar.
spring.datasource.hikari.leak-detection-threshold=20000

# =============================
# TIMEOUTS DB / TX
# =============================
spring.transaction.default-timeout=10
spring.jpa.properties.jakarta.persistence.query.timeout=10000

# =============================
# JPA / Hibernate
# =============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# Ya no pongas dialect explícito.
# Hibernate/Oracle JDBC lo detectan solo.
# spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# =============================
# CORS
# =============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# =============================
# TELEGRAM
# =============================
telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:true}
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.name=${TELEGRAM_BOT_NAME}
telegram.bot.default-priority-id=${TELEGRAM_DEFAULT_PRIORITY_ID:2}
telegram.bot.default-status-id=${TELEGRAM_DEFAULT_STATUS_ID:1}
telegram.bot.default-due-days=${TELEGRAM_DEFAULT_DUE_DAYS:7}

# Solo una instancia blue/green debe hacer polling.
telegram.bot.polling-enabled=${TELEGRAM_POLLING_ENABLED:false}

# =============================
# KAFKA
# =============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:oracle-java-bot-group}
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.properties.spring.json.trusted.packages=${KAFKA_TRUSTED_PACKAGES:*}

# =============================
# SUPABASE STORAGE - S3
# =============================
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT}
supabase.s3.region=${SUPABASE_S3_REGION}
supabase.s3.access-key=${SUPABASE_S3_ACCESS_KEY}
supabase.s3.secret-key=${SUPABASE_S3_SECRET_KEY}
supabase.storage.bucket=${SUPABASE_BUCKET}
supabase.storage.public-url-base=${SUPABASE_PUBLIC_URL_BASE}

# =============================
# GRAPHQL
# =============================
spring.graphql.http.path=/graphql
spring.graphql.graphiql.enabled=${GRAPHQL_GRAPHIQL_ENABLED:false}

# =============================
# GITHUB INTEGRATION
# =============================
github.api.base-url=${GITHUB_API_BASE_URL:https://api.github.com}
github.tokens.oracle-java-bot-frontend=${GITHUB_TOKEN_FRONTEND:}
github.tokens.oracle-java-bot-backend=${GITHUB_TOKEN_BACKEND:}
github.tokens.oracle-java-bot-testing=${GITHUB_TOKEN_TESTING:}
github.tokens.oracle-java-bot-ai-service=${GITHUB_TOKEN_AI_SERVICE:}
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}