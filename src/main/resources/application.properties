spring.application.name=oracle-java-bot-backend

server.port=8080

spring.datasource.url=jdbc:oracle:thin:@team43_tp?TNS_ADMIN=wallet
spring.datasource.username=CHATBOT_USER
spring.datasource.password=SolSna260593
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# =============================
# HIKARI (tolerancia al wake-up de Oracle ADB)
# =============================
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://159.54.133.243:8080

# Master switch: when true, this instance can SEND to Telegram (bot replies + Kafka
# task-assignment notifications via TaskEventConsumer). Keep true on EVERY instance.
telegram.bot.enabled=true
telegram.bot.token=8671121723:AAFUUjRBa2otHHDB9aaS4A_qqUTlBooYiAg
telegram.bot.name=claygh_bot
telegram.bot.default-priority-id=2
telegram.bot.default-status-id=1
telegram.bot.default-due-days=7

# Only the ACTIVE blue/green instance may long-poll Telegram. Telegram allows a single
# getUpdates consumer per bot token; two pollers cause "terminated by other getUpdates
# request" (HTTP 409). Set env TELEGRAM_POLLING_ENABLED=true on exactly ONE (the active)
# color and leave it unset/false on the standby. Defaults to false so a freshly started
# instance never polls unless explicitly told to.
telegram.bot.polling-enabled=${TELEGRAM_POLLING_ENABLED:false}

# =============================
# KAFKA
# =============================
# Must match Kafka's advertised listener: KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092.
# This broker listens on 9092 (single listener), NOT 29092 — pointing at 29092 fails at
# bootstrap with "Connection to node -1 (kafka:29092) could not be established".
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

spring.kafka.consumer.group-id=oracle-java-bot-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

# =============================
# SUPABASE STORAGE - S3
# =============================
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT}
supabase.s3.region=${SUPABASE_S3_REGION}
supabase.s3.access-key=${SUPABASE_S3_ACCESS_KEY}
supabase.s3.secret-key=${SUPABASE_S3_SECRET_KEY}
supabase.storage.bucket=${SUPABASE_BUCKET}
supabase.storage.public-url-base=${SUPABASE_PUBLIC_URL_BASE}

# =============================
# GRAPHQL
# =============================
spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=true

# =============================
# GITHUB INTEGRATION
# =============================
github.api.base-url=https://api.github.com
github.tokens.oracle-java-bot-frontend=${GITHUB_TOKEN_FRONTEND}
github.tokens.oracle-java-bot-backend=${GITHUB_TOKEN_BACKEND}
github.tokens.oracle-java-bot-testing=${GITHUB_TOKEN_TESTING}
github.tokens.oracle-java-bot-ai-service=${GITHUB_TOKEN_AI_SERVICE}
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}