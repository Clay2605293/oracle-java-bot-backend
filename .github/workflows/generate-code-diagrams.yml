name: Generate Level 4 Code Diagrams

on:
  push:
    branches:
      - main
    paths:
      - "src/main/java/**"
      - "pom.xml"
      - ".github/workflows/generate-code-diagrams.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-diagrams:
    name: Generate PlantUML diagrams from Java code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Generate PlantUML diagrams
        run: ./mvnw generate-sources

      - name: Commit generated diagrams
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update generated Level 4 PlantUML diagrams"
          file_pattern: "docs/diagrams/*.puml"
